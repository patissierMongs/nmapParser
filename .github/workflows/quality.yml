name: quality

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m py_compile nmapParser.py xlsx_io.py scripts/check_readme_options_sync.py

      - name: README/options sync check
        run: python scripts/check_readme_options_sync.py
