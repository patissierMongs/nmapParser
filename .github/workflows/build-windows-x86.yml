name: build-windows-x86

# x86(32-bit) PyInstaller onefile 빌드.
# 결과물은 64-bit Windows 에서도 WoW64 로 그대로 동작 → 단일 .exe 로 통일.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (x86)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x86"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build x86 onefile exe
        # --noupx: UPX 압축은 Windows Defender / SmartScreen 의 휴리스틱
        #   오탐을 자주 일으켜 첫 실행 시 Explorer 가 멈춘 듯 보이는 원인이 됨.
        # --clean: 이전 빌드 캐시 잔재 제거.
        run: pyinstaller --onefile --noconsole --noupx --clean --name nmapParser nmapParser.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nmapParser-x86
          path: dist/nmapParser.exe
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nmapParser.exe
